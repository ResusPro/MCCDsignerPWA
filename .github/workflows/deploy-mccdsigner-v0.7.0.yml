name: Deploy MCCDSigner PWA v0.7.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-clean-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify deployment payload
        shell: bash
        run: |
          echo "eaadd535d03dbcceb36aeeaf69729cd96d5e7ea8bbd0ce5b250e5a626d261ca6  MCCDSigner_v0_7_0_DEPLOY_PAYLOAD.zip" | sha256sum --check -

      - name: Replace stale repository files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/mccdsigner-v070
          mkdir -p /tmp/mccdsigner-v070
          unzip -q MCCDSigner_v0_7_0_DEPLOY_PAYLOAD.zip -d /tmp/mccdsigner-v070

          test -f /tmp/mccdsigner-v070/index.html
          test -f /tmp/mccdsigner-v070/assets/app-v0.7.0.js
          test -f /tmp/mccdsigner-v070/ocr/lang/eng.traineddata.gz
          test -f /tmp/mccdsigner-v070/sw.js

          if [ -f CNAME ]; then
            cp CNAME /tmp/MCCDSigner-CNAME
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/mccdsigner-v070/. .

          if [ -f /tmp/MCCDSigner-CNAME ]; then
            cp /tmp/MCCDSigner-CNAME CNAME
          fi

      - name: Commit clean v0.7.0 deployment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy MCCDSigner PWA v0.7.0 recovery build"
          git push origin "HEAD:${{ github.ref_name }}"
